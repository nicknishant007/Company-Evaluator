services:

  postgres:

    image: postgres:16

    container_name: company_postgres

    environment:
      POSTGRES_DB: company_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    container_name: company_redis

    ports:
      - "6379:6379"

  backend:

    build:
      context: .
      dockerfile: docker/backend.Dockerfile

    container_name: company_backend

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis

    env_file:
      - .env

volumes:

  postgres_data: